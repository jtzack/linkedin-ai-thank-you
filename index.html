<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're On The Waitlist | LinkedIn AI LIVE</title>
  <meta name="description" content="You're on the waitlist for LinkedIn AI LIVE. We'll be in touch when enrollment opens." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── LinkedIn AI LIVE design tokens ── */
    :root {
      --navy:         #0A1B47;  /* dark blue  */
      --navy-surface: #122456;  /* lifted card surface (derived from navy) */
      --navy-shadow:  #050F2E;  /* deeper navy for soft shadow */
      --blue:         #455885;  /* mid blue   */
      --blue-light:   #4FA4E5;  /* light blue / accent */
      --white:        #FFFFFF;  /* white      */
      --muted:        #AEBCD9;  /* soft blue-grey body text */

      --font-display: "Anton", "Bebas Neue", Impact, system-ui, sans-serif;
      --font-sans:    "Inter", system-ui, -apple-system, sans-serif;

      --shadow-soft: 0 10px 30px rgba(5, 15, 46, 0.45);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--navy); }
    ::selection { background: var(--blue-light); color: var(--navy); }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      background-color: var(--navy);
      color: var(--white);
      min-height: 100vh;
      padding: 36px 20px 72px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }

    .container {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(0.16, 0.84, 0.36, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Brand wordmark ─── */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--blue-light);
      color: var(--navy);
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1;
    }

    .brand .wordmark {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--white);
    }

    /* ─── Display headline ─── */
    h1.display {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(32px, 5.5vw, 52px);
      line-height: 0.92;
      letter-spacing: -0.005em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 20px;
    }

    h1.display .accent {
      color: var(--blue-light);
    }

    /* ─── Sneak-peek card ─── */
    .card {
      background: var(--navy-surface);
      border: 1px solid var(--blue);
      border-radius: 8px;
      padding: 22px 24px 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-soft);
    }

    .card-eyebrow {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: 10px;
    }

    .card h2 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(22px, 3.5vw, 30px);
      line-height: 0.95;
      letter-spacing: -0.005em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 12px;
    }

    .card p {
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
    }

    .card p strong {
      color: var(--blue-light);
      font-weight: 600;
    }

    /* ─── Survey embed ─── */
    .survey-section {
      margin-top: 8px;
    }

    .survey-embed {
      width: 100%;
      background: var(--navy-surface);
      border: 1px solid var(--blue);
      border-radius: 8px;
      height: 480px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .survey-embed iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 32px;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--blue);
    }

    footer .wordmark {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: 8px;
    }

    @media (max-width: 640px) {
      body { padding: 28px 18px 56px; }
      .card { padding: 20px 20px 18px; }
      h1.display { font-size: clamp(28px, 8vw, 40px); }
      .survey-embed { height: 460px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Brand -->
    <div class="brand">
      <span class="badge">in</span>
      <span class="wordmark">LinkedIn AI LIVE</span>
    </div>

    <!-- Headline -->
    <h1 class="display">
      Boom! You're <span class="accent">on the waitlist.</span>
    </h1>

    <!-- Sneak-peek card -->
    <div class="card">
      <div class="card-eyebrow">In the meantime</div>
      <h2>Want a sneak peek?</h2>
      <p>Answer <strong>3 quick questions</strong> and we'll give you<br>free access to our Finding Your LinkedIn Voice Archetype.</p>
    </div>

    <!-- Typeform survey -->
    <div class="survey-section">
      <div class="survey-embed">
        <iframe id="typeform-embed" title="Sneak Peek Form" allow="camera; microphone; autoplay; encrypted-media;"></iframe>
      </div>
    </div>

    <footer>
      <div class="wordmark">LinkedIn AI LIVE</div>
      &copy; 2026 LinkedIn AI LIVE. All rights reserved.
    </footer>
  </div>

  <script>
    // Parse email manually so literal "+" survives (URLSearchParams would turn it into a space)
    function readEmail(source) {
      var match = source.match(/(?:^|[?&#])email=([^&]*)/);
      if (!match) return '';
      try { return decodeURIComponent(match[1]); } catch (e) { return match[1]; }
    }
    var email = readEmail(window.location.hash) || readEmail(window.location.search) || 'xxxxx';
    var typeformId = 'By3W8eb7';
    var src = 'https://form.typeform.com/to/' + typeformId + '#email=' + encodeURIComponent(email);
    document.getElementById('typeform-embed').src = src;
  </script>
</body>
</html>
